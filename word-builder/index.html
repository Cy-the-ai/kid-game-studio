<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Builder 🔤</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .word-display {
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .letter-tile {
            width: 70px;
            height: 70px;
            background: white;
            border: 4px solid #FFD700;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .letter-tile:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .letter-tile:active {
            transform: scale(0.95);
        }
        .letter-tile.used {
            opacity: 0.3;
            pointer-events: none;
        }
        .letter-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            min-height: 100px;
        }
        .btn-builder {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: 3px solid white;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 30px;
            padding: 15px 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        .btn-builder:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .score-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .builder-title {
            color: #FFD700;
            text-shadow: 2px 2px 0 #667eea;
        }
        .message-box {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .hint-text {
            color: rgba(255,255,255,0.8);
            font-size: 1.2rem;
        }
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1); }
        }
        .celebrate {
            animation: celebrate 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container py-3">
        <div class="text-center mb-3">
            <h1 class="display-4 builder-title">
                <i class="fas fa-spell-check me-3"></i>Word Builder
            </h1>
            <p class="lead text-white">Drag letters to spell the word!</p>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <div class="score-panel text-center">
                    <h5><i class="fas fa-lightbulb text-warning"></i> Hint</h5>
                    <div class="hint-text" id="hint">Click Start to begin!</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="score-panel text-center">
                    <h5><i class="fas fa-star text-warning"></i> Score</h5>
                    <div class="display-4" id="score">0</div>
                </div>
            </div>
        </div>

        <div class="score-panel mb-3">
            <div class="word-display" id="word-display">
                <span style="opacity: 0.3;">_ _ _</span>
            </div>
        </div>

        <div class="letter-pool mb-3" id="letter-pool">
            <!-- Letters will be generated here -->
        </div>

        <div class="text-center mb-3">
            <button class="btn btn-builder" onclick="startGame()">
                <i class="fas fa-play me-2"></i>Start
            </button>
            <button class="btn btn-builder" onclick="resetWord()">
                <i class="fas fa-undo me-2"></i>Reset
            </button>
            <button class="btn btn-builder" onclick="clearWord()">
                <i class="fas fa-eraser me-2"></i>Clear
            </button>
        </div>

        <div id="message" class="text-center mt-3 message-box text-white"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const words = [
            'CAT', 'DOG', 'SUN', 'COW', 'FOX',
            'FISH', 'BIRD', 'MOON', 'STAR', 'FROG',
            'TREE', 'FLOW', 'BOOK', 'CAKE', 'RAIN'
        ];

        const wordHints = {
            'CAT': 'A small pet that says meow',
            'DOG': 'Man\'s best friend, barks',
            'SUN': 'Bright star in the sky',
            'COW': 'Moo! Farm animal',
            'FOX': 'Clever, orange animal',
            'FISH': 'Swims in water',
            'BIRD': 'Flies in the sky',
            'MOON': 'Lights up the night',
            'STAR': 'Twinkle, twinkle!',
            'FROG': 'Green, jumps and croaks',
            'TREE': 'Has leaves and grows tall',
            'FLOW': 'Water moves like this',
            'BOOK': 'Read this to learn',
            'CAKE': 'Sweet treat for birthdays',
            'RAIN': 'Water falls from clouds'
        };

        let currentWord = '';
        let currentLetters = [];
        let builtWord = '';
        let score = 0;
        let gameActive = false;

        function startGame() {
            gameActive = true;
            generateNewWord();
        }

        function generateNewWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            currentLetters = currentWord.split('').sort(() => Math.random() - 0.5);
            builtWord = '';

            document.getElementById('hint').textContent = wordHints[currentWord];
            document.getElementById('word-display').innerHTML = '<span style="opacity: 0.3;">' + '_ '.repeat(currentWord.length).trim() + '</span>';
            document.getElementById('message').textContent = '';

            createLetterPool();
            speak(`Spell ${currentWord}`);
        }

        function createLetterPool() {
            const pool = document.getElementById('letter-pool');
            pool.innerHTML = '';

            currentLetters.forEach((letter, index) => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.textContent = letter;
                tile.dataset.index = index;
                tile.dataset.letter = letter;
                tile.onclick = () => selectLetter(tile, letter);
                pool.appendChild(tile);
            });
        }

        function selectLetter(tile, letter) {
            if (!gameActive || tile.classList.contains('used')) return;

            builtWord += letter;
            tile.classList.add('used');

            updateWordDisplay();
            speak(letter);

            if (builtWord.length === currentWord.length) {
                checkWord();
            }
        }

        function updateWordDisplay() {
            let display = '';
            for (let i = 0; i < currentWord.length; i++) {
                if (i < builtWord.length) {
                    display += `<span class="celebrate">${builtWord[i]}</span> `;
                } else {
                    display += '<span style="opacity: 0.3;">_</span> ';
                }
            }
            document.getElementById('word-display').innerHTML = display.trim();
        }

        function checkWord() {
            if (builtWord === currentWord) {
                score += currentWord.length * 10;
                document.getElementById('score').textContent = score;
                document.getElementById('message').textContent = '🎉 Perfect! You spelled it right!';
                speak('Perfect! You spelled it right!');

                setTimeout(() => {
                    document.getElementById('message').textContent = '';
                    generateNewWord();
                }, 2500);
            } else {
                document.getElementById('message').textContent = '❌ Try again!';
                speak('Try again!');
            }
        }

        function resetWord() {
            if (!gameActive) return;

            builtWord = '';
            document.querySelectorAll('.letter-tile').forEach(tile => tile.classList.remove('used'));
            document.getElementById('word-display').innerHTML = '<span style="opacity: 0.3;">' + '_ '.repeat(currentWord.length).trim() + '</span>';
            document.getElementById('message').textContent = '';
        }

        function clearWord() {
            if (!gameActive) return;

            builtWord = '';
            document.querySelectorAll('.letter-tile').forEach(tile => tile.classList.remove('used'));
            document.getElementById('word-display').innerHTML = '<span style="opacity: 0.3;">' + '_ '.repeat(currentWord.length).trim() + '</span>';
            document.getElementById('message').textContent = '';
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;
                utterance.pitch = 1.2;
                speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
