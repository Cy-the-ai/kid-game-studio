<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid Game Studio 🎮</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow-x: hidden;
        }
        .hero-section {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }
        .studio-title {
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: none;
        }
        .feature-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .feature-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            height: 100%;
            transition: all 0.3s;
            border: 4px solid transparent;
            cursor: pointer;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border-color: #FFD700;
        }
        .play-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: 3px solid #FFD700;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            border-radius: 50px;
            padding: 20px 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s;
            margin-top: 20px;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .age-tag {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .floating {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <!-- Hero Section -->
        <div class="hero-section text-center text-white">
            <div class="floating" style="font-size: 5rem; margin-bottom: 20px;">🎮</div>
            <h1 class="studio-title">Kid Game Studio</h1>
            <p class="lead" style="font-size: 1.3rem; margin: 20px 0;">
                Fun educational games for young learners!
            </p>
            <div class="age-tag d-inline-block mb-4">
                <i class="fas fa-child me-2"></i>Perfect for Ages 4-6
            </div>
            <a href="reading-adventure/" class="play-btn">
                <i class="fas fa-play-circle me-3"></i>Start Playing!
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
