<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Carnival 🎪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        #game-area {
            position: relative;
            width: 100%;
            height: 500px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            border-radius: 20px;
            border: 5px solid #FFD700;
            overflow: hidden;
        }
        .falling-object {
            position: absolute;
            font-size: 3rem;
            cursor: pointer;
            user-select: none;
            animation: fall linear;
            transition: transform 0.1s;
        }
        .falling-object:active {
            transform: scale(1.3);
        }
        @keyframes fall {
            from { top: -60px; }
            to { top: 100%; }
        }
        .count-display {
            font-size: 8rem;
            font-weight: bold;
            color: #FF6B6B;
            text-shadow: 3px 3px 0 #fff, -1px -1px 0 #fff;
            text-align: center;
        }
        .btn-carnival {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: 3px solid #FF6B6B;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 30px;
            padding: 15px 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        .btn-carnival:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .difficulty-btn {
            width: 120px;
            margin: 10px;
        }
        .difficulty-btn.active {
            background: #28a745 !important;
            border-color: #1e7e34 !important;
        }
        .score-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .target-display {
            font-size: 4rem;
            color: #4ECDC4;
            text-align: center;
        }
        .carnival-title {
            color: #FF6B6B;
            text-shadow: 2px 2px 0 #FFD700;
        }
    </style>
</head>
<body>
    <div class="container py-3">
        <div class="text-center mb-3">
            <h1 class="display-4 carnival-title">
                <i class="fas fa-ticket-alt me-3"></i>Counting Carnival
            </h1>
            <p class="lead">Tap the falling objects to count them!</p>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <div class="score-panel">
                    <h5><i class="fas fa-bullseye text-primary"></i> Target</h5>
                    <div class="target-display" id="target-number">5</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="score-panel">
                    <h5><i class="fas fa-hashtag text-success"></i> Count</h5>
                    <div class="count-display" id="current-count">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="score-panel">
                    <h5><i class="fas fa-star text-warning"></i> Score</h5>
                    <div class="display-4 text-center" id="score">0</div>
                </div>
            </div>
        </div>

        <div class="text-center mb-3">
            <div class="btn-group">
                <button class="btn btn-outline-primary difficulty-btn active" onclick="setDifficulty(5, 1)">
                    <i class="fas fa-leaf"></i><br>Easy (1-5)
                </button>
                <button class="btn btn-outline-primary difficulty-btn" onclick="setDifficulty(10, 2)">
                    <i class="fas fa-star"></i><br>Medium (1-10)
                </button>
                <button class="btn btn-outline-primary difficulty-btn" onclick="setDifficulty(20, 3)">
                    <i class="fas fa-fire"></i><br>Hard (1-20)
                </button>
            </div>
        </div>

        <div class="text-center mb-3">
            <button class="btn btn-carnival" onclick="startGame()">
                <i class="fas fa-play me-2"></i>Start Game
            </button>
            <button class="btn btn-carnival" onclick="resetGame()">
                <i class="fas fa-redo me-2"></i>Reset
            </button>
        </div>

        <div id="game-area"></div>

        <div id="message" class="text-center mt-3 display-6 fw-bold text-success"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let count = 0;
        let target = 5;
        let score = 0;
        let gameActive = false;
        let objects = [];
        let maxNumber = 5;
        let fallSpeed = 1;

        const emojis = ['🍎', '⭐', '🎈', '🎀', '🍪', '🌸', '🦋', '🌈', '🍭', '🎁'];

        function setDifficulty(max, speed) {
            maxNumber = max;
            fallSpeed = speed;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.difficulty-btn').classList.add('active');
        }

        function startGame() {
            if (gameActive) return;
            gameActive = true;
            generateNewRound();
        }

        function resetGame() {
            gameActive = false;
            count = 0;
            score = 0;
            objects = [];
            document.getElementById('game-area').innerHTML = '';
            document.getElementById('current-count').textContent = '0';
            document.getElementById('score').textContent = '0';
            document.getElementById('message').textContent = '';
        }

        function generateNewRound() {
            if (!gameActive) return;

            count = 0;
            target = Math.floor(Math.random() * maxNumber) + 1;
            document.getElementById('target-number').textContent = target;
            document.getElementById('current-count').textContent = '0';
            document.getElementById('message').textContent = '';

            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = '';

            for (let i = 0; i < target; i++) {
                createFallingObject(gameArea);
            }

            speak(`Count to ${target}!`);
        }

        function createFallingObject(gameArea) {
            const obj = document.createElement('div');
            obj.className = 'falling-object';
            obj.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            obj.style.left = Math.random() * (gameArea.offsetWidth - 50) + 'px';
            obj.style.animationDuration = (4 + Math.random() * 3) / fallSpeed + 's';
            obj.onclick = () => handleClick(obj);

            gameArea.appendChild(obj);
            objects.push(obj);
        }

        function handleClick(obj) {
            if (!gameActive) return;
            if (!objects.includes(obj)) return;

            count++;
            document.getElementById('current-count').textContent = count;
            speak(count.toString());

            obj.remove();
            objects = objects.filter(o => o !== obj);

            if (count === target) {
                score += target * 10;
                document.getElementById('score').textContent = score;
                document.getElementById('message').textContent = '🎉 Correct! Great job!';
                speak('Great job!');

                setTimeout(() => {
                    document.getElementById('message').textContent = '';
                    generateNewRound();
                }, 2000);
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;
                utterance.pitch = 1.2;
                speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
