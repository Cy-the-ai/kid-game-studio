<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Carnival 🎪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 5px;
            display: flex;
            flex-direction: column;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .carnival-title {
            color: #FF6B6B;
            font-size: 1.3rem;
            margin: 0;
            text-shadow: 1px 1px 0 #FFD700;
        }

        .stats-container {
            background: white;
            border-radius: 10px;
            padding: 6px 10px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1;
        }

        .target-val { color: #4ECDC4; }
        .count-val { color: #FF6B6B; }
        .score-val { color: #FFD700; font-size: 1.4rem; }

        .difficulty-container {
            background: white;
            border-radius: 10px;
            padding: 5px;
            display: flex;
            gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .diff-btn {
            flex: 1;
            min-height: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .diff-btn.active {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            flex: 1;
            min-height: 45px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .control-btn.reset {
            background: linear-gradient(45deg, #FF6B6B, #ee5a5a);
        }

        #game-area {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            border-radius: 10px;
            border: 3px solid #FFD700;
            overflow: hidden;
            touch-action: none;
            position: relative;
            height: 200px;
            min-height: 200px;
            flex-shrink: 0;
        }

        .falling-object {
            position: absolute;
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            animation: fall linear;
            transition: transform 0.1s;
            z-index: 10;
            touch-action: manipulation;
            min-width: 50px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .falling-object:active {
            transform: scale(1.2);
        }

        @keyframes fall {
            from { top: -50px; }
            to { top: 100%; }
        }

        #message {
            background: white;
            border-radius: 10px;
            padding: 8px 12px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #message.success {
            color: #28a745;
        }

        /* Desktop */
        @media (min-width: 768px) {
            body {
                padding: 15px;
                justify-content: center;
            }

            .game-container {
                max-width: 600px;
                gap: 10px;
            }

            .header {
                padding: 12px 20px;
            }

            .carnival-title {
                font-size: 1.8rem;
            }

            .stat-value {
                font-size: 2.5rem;
            }

            .score-val {
                font-size: 1.8rem;
            }

            .diff-btn {
                min-height: 50px;
                font-size: 0.9rem;
            }

            .control-btn {
                min-height: 55px;
                font-size: 1.1rem;
            }

            #game-area {
                height: 300px;
                min-height: 300px;
            }

            .falling-object {
                font-size: 2.5rem;
                min-width: 70px;
                min-height: 70px;
            }

            #message {
                font-size: 1.2rem;
                min-height: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <h1 class="carnival-title">
                <i class="fas fa-ticket-alt"></i> Counting Carnival
            </h1>
        </div>

        <!-- Stats -->
        <div class="stats-container">
            <div class="stat">
                <div class="stat-label"><i class="fas fa-bullseye"></i> Target</div>
                <div class="stat-value target-val" id="target-number">5</div>
            </div>
            <div class="stat">
                <div class="stat-label"><i class="fas fa-hashtag"></i> Count</div>
                <div class="stat-value count-val" id="current-count">0</div>
            </div>
            <div class="stat">
                <div class="stat-label"><i class="fas fa-star"></i> Score</div>
                <div class="stat-value score-val" id="score">0</div>
            </div>
        </div>

        <!-- Difficulty -->
        <div class="difficulty-container">
            <button class="diff-btn active" onclick="setDifficulty(5, 1)">
                <i class="fas fa-leaf"></i> Easy
            </button>
            <button class="diff-btn" onclick="setDifficulty(10, 2)">
                <i class="fas fa-star"></i> Med
            </button>
            <button class="diff-btn" onclick="setDifficulty(20, 3)">
                <i class="fas fa-fire"></i> Hard
            </button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn" onclick="startGame()">
                <i class="fas fa-play"></i> Start
            </button>
            <button class="control-btn reset" onclick="resetGame()">
                <i class="fas fa-redo"></i> Reset
            </button>
        </div>

        <!-- Game Area -->
        <div id="game-area"></div>

        <!-- Message -->
        <div id="message"></div>
    </div>

    <script>
        let count = 0;
        let target = 5;
        let score = 0;
        let gameActive = false;
        let objects = [];
        let maxNumber = 5;
        let fallSpeed = 1;

        const emojis = ['🍎', '⭐', '🎈', '🎀', '🍪', '🌸', '🦋', '🌈', '🍭', '🎁'];

        function setDifficulty(max, speed) {
            maxNumber = max;
            fallSpeed = speed;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.diff-btn').classList.add('active');
        }

        function startGame() {
            if (gameActive) return;
            gameActive = true;
            generateNewRound();
        }

        function resetGame() {
            gameActive = false;
            count = 0;
            score = 0;
            objects = [];
            document.getElementById('game-area').innerHTML = '';
            document.getElementById('current-count').textContent = '0';
            document.getElementById('score').textContent = '0';
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('success');
        }

        function generateNewRound() {
            if (!gameActive) return;

            count = 0;
            target = Math.floor(Math.random() * maxNumber) + 1;
            document.getElementById('target-number').textContent = target;
            document.getElementById('current-count').textContent = '0';
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('success');

            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = '';

            for (let i = 0; i < target; i++) {
                createFallingObject(gameArea);
            }

            speak(`Count to ${target}!`);
        }

        function createFallingObject(gameArea) {
            const obj = document.createElement('div');
            obj.className = 'falling-object';
            obj.textContent = emojis[Math.floor(Math.random() * emojis.length)];

            // Random horizontal position
            const maxX = gameArea.offsetWidth - 50;
            obj.style.left = Math.max(0, Math.random() * maxX) + 'px';

            // Random fall speed
            obj.style.animationDuration = (4 + Math.random() * 3) / fallSpeed + 's';

            // Handle both click and touch events
            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!gameActive) return;
                if (!objects.includes(obj)) return;

                count++;
                document.getElementById('current-count').textContent = count;
                speak(count.toString());

                obj.remove();
                objects = objects.filter(o => o !== obj);

                if (count === target) {
                    score += target * 10;
                    document.getElementById('score').textContent = score;
                    document.getElementById('message').textContent = '🎉 Correct!';
                    document.getElementById('message').classList.add('success');
                    speak('Great job!');

                    setTimeout(() => {
                        document.getElementById('message').textContent = '';
                        document.getElementById('message').classList.remove('success');
                        generateNewRound();
                    }, 2000);
                }
            };

            obj.addEventListener('click', handleClick);
            obj.addEventListener('touchend', (e) => {
                e.preventDefault();
                handleClick(e);
            });

            gameArea.appendChild(obj);
            objects.push(obj);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;
                utterance.pitch = 1.2;
                speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
