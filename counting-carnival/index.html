<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Carnival 🎪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 4px;
            display: flex;
            flex-direction: column;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 6px 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .carnival-title {
            color: #FF6B6B;
            font-size: 1.1rem;
            margin: 0;
            text-shadow: 1px 1px 0 #FFD700;
        }

        .stats-container {
            background: white;
            border-radius: 10px;
            padding: 6px 8px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.6rem;
            color: #666;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1;
        }

        .target-val { color: #4ECDC4; }
        .count-val { color: #FF6B6B; }
        .score-val { color: #FFD700; font-size: 1.1rem; }

        .difficulty-container {
            background: white;
            border-radius: 10px;
            padding: 4px;
            display: flex;
            gap: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .diff-btn {
            flex: 1;
            min-height: 38px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 8px;
            cursor: pointer;
            padding: 4px;
        }

        .diff-btn.active {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .controls {
            display: flex;
            gap: 6px;
        }

        .control-btn {
            flex: 1;
            min-height: 44px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .control-btn.reset {
            background: linear-gradient(45deg, #FF6B6B, #ee5a5a);
        }

        #game-area {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            border-radius: 10px;
            border: 3px solid #FFD700;
            overflow: hidden;
            position: relative;
            flex: 1;
            min-height: 320px;
        }

        .falling-object {
            position: absolute;
            font-size: 2.5rem;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            animation: fall linear forwards;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            min-width: 65px;
            min-height: 65px;
        }

        .falling-object:active {
            transform: scale(1.15);
        }

        @keyframes fall {
            from {
                top: -70px;
                opacity: 1;
            }
            to {
                top: 100%;
                opacity: 0;
            }
        }

        #message {
            background: white;
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #message.success {
            color: #28a745;
        }

        #message.error {
            color: #dc3545;
        }

        .streak-counter {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 100;
        }

        .streak-counter.hidden {
            display: none;
        }

        .confetti {
            position: absolute;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: confetti-fall 3.5s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(350px) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .pop-animation {
            animation: pop 0.3s ease-out;
        }

        /* Tablet */
        @media (min-width: 576px) {
            body {
                padding: 10px;
                justify-content: center;
            }

            .game-container {
                max-width: 600px;
                gap: 10px;
            }

            .header {
                padding: 10px 15px;
            }

            .carnival-title {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .score-val {
                font-size: 1.5rem;
            }

            .diff-btn {
                min-height: 45px;
                font-size: 0.85rem;
            }

            .control-btn {
                min-height: 50px;
                font-size: 1rem;
            }

            #game-area {
                min-height: 380px;
            }

            .falling-object {
                font-size: 2.8rem;
                min-width: 75px;
                min-height: 75px;
            }

            #message {
                font-size: 1.1rem;
                min-height: 45px;
            }
        }

        /* Desktop */
        @media (min-width: 768px) {
            body {
                padding: 20px;
            }

            .game-container {
                max-width: 700px;
                gap: 15px;
            }

            .header {
                padding: 15px 25px;
            }

            .carnival-title {
                font-size: 2rem;
            }

            .stats-container {
                padding: 10px 15px;
                gap: 8px;
            }

            .stat-label {
                font-size: 0.75rem;
            }

            .stat-value {
                font-size: 2.5rem;
            }

            .score-val {
                font-size: 1.8rem;
            }

            .diff-btn {
                min-height: 55px;
                font-size: 1rem;
            }

            .control-btn {
                min-height: 60px;
                font-size: 1.2rem;
            }

            #game-area {
                min-height: 450px;
            }

            .falling-object {
                font-size: 3rem;
                min-width: 85px;
                min-height: 85px;
            }

            #message {
                font-size: 1.3rem;
                min-height: 50px;
                padding: 12px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <h1 class="carnival-title">
                <i class="fas fa-ticket-alt"></i> Counting Carnival
            </h1>
        </div>

        <!-- Stats -->
        <div class="stats-container">
            <div class="stat">
                <div class="stat-label"><i class="fas fa-bullseye"></i> Target</div>
                <div class="stat-value target-val" id="target-number">5</div>
            </div>
            <div class="stat">
                <div class="stat-label"><i class="fas fa-hashtag"></i> Count</div>
                <div class="stat-value count-val" id="current-count">0</div>
            </div>
            <div class="stat">
                <div class="stat-label"><i class="fas fa-star"></i> Score</div>
                <div class="stat-value score-val" id="score">0</div>
            </div>
        </div>

        <!-- Difficulty -->
        <div class="difficulty-container">
            <button class="diff-btn active" onclick="setDifficulty(5, 1)">
                <i class="fas fa-leaf"></i> Easy
            </button>
            <button class="diff-btn" onclick="setDifficulty(10, 2)">
                <i class="fas fa-star"></i> Med
            </button>
            <button class="diff-btn" onclick="setDifficulty(20, 3)">
                <i class="fas fa-fire"></i> Hard
            </button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn" onclick="startGame()">
                <i class="fas fa-play"></i> Start
            </button>
            <button class="control-btn reset" onclick="resetGame()">
                <i class="fas fa-redo"></i> Reset
            </button>
        </div>

        <!-- Game Area -->
        <div id="game-area">
            <div class="streak-counter hidden" id="streak-counter">🔥0</div>
            <div class="confetti" id="confetti-container"></div>
        </div>

        <!-- Message -->
        <div id="message"></div>
    </div>

    <script>
        let count = 0;
        let target = 5;
        let score = 0;
        let gameActive = false;
        let objects = [];
        let maxNumber = 5;
        let fallSpeed = 1;
        let streak = 0;

        const emojis = ['🍎', '⭐', '🎈', '🎀', '🍪', '🌸', '🦋', '🌈', '🍭', '🎁', '🎨', '🎭'];
        const confettiColors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff69b4', '#7cfc00', '#ff1493'];

        function setDifficulty(max, speed) {
            maxNumber = max;
            fallSpeed = speed;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.diff-btn').classList.add('active');
        }

        function startGame() {
            if (gameActive) return;
            gameActive = true;
            streak = 0;
            updateStreakDisplay();
            generateNewRound();
        }

        function resetGame() {
            gameActive = false;
            count = 0;
            score = 0;
            streak = 0;
            objects = [];
            document.getElementById('game-area').innerHTML = '<div class="streak-counter hidden" id="streak-counter">🔥0</div><div class="confetti" id="confetti-container"></div>';
            document.getElementById('current-count').textContent = '0';
            document.getElementById('score').textContent = '0';
            document.getElementById('target-number').textContent = '5';
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('success', 'error');
            updateStreakDisplay();
        }

        function updateStreakDisplay() {
            const streakCounter = document.getElementById('streak-counter');
            if (streak >= 3) {
                streakCounter.textContent = `🔥${streak}`;
                streakCounter.classList.remove('hidden');
            } else {
                streakCounter.classList.add('hidden');
            }
        }

        function triggerConfetti() {
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < 35; i++) {
                setTimeout(() => {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.top = Math.random() * 40 + '%';
                    piece.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
                    container.appendChild(piece);

                    setTimeout(() => piece.remove(), 5000);
                }, i * 35);
            }
        }

        function generateNewRound() {
            if (!gameActive) return;

            count = 0;
            target = Math.floor(Math.random() * maxNumber) + 1;
            document.getElementById('target-number').textContent = target;
            document.getElementById('current-count').textContent = '0';
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('success', 'error');

            const gameArea = document.getElementById('game-area');
            const existingConfetti = gameArea.querySelector('.confetti');
            const existingStreak = gameArea.querySelector('.streak-counter');

            gameArea.innerHTML = '';
            if (existingConfetti) gameArea.appendChild(existingConfetti);
            if (existingStreak) gameArea.appendChild(existingStreak);

            for (let i = 0; i < target; i++) {
                createFallingObject(gameArea);
            }

            speak(`Count to ${target}!`);
        }

        function createFallingObject(gameArea) {
            const obj = document.createElement('div');
            obj.className = 'falling-object';
            obj.textContent = emojis[Math.floor(Math.random() * emojis.length)];

            const gameAreaRect = gameArea.getBoundingClientRect();
            const maxX = gameAreaRect.width - 70;
            obj.style.left = Math.max(5, Math.random() * maxX) + 'px';

            // Slower fall speed on mobile for easier tapping
            const isMobile = window.innerWidth < 576;
            const baseSpeed = isMobile ? 8 : 5;
            obj.style.animationDuration = (baseSpeed + Math.random() * 4) / fallSpeed + 's';

            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!gameActive) return;
                if (!objects.includes(obj)) return;

                count++;
                document.getElementById('current-count').textContent = count;

                const countDisplay = document.getElementById('current-count');
                countDisplay.classList.remove('pop-animation');
                void countDisplay.offsetWidth;
                countDisplay.classList.add('pop-animation');

                speak(count.toString());

                obj.remove();
                objects = objects.filter(o => o !== obj);

                if (count === target) {
                    streak++;
                    updateStreakDisplay();

                    const streakBonus = streak >= 3 ? streak * 5 : 0;
                    score += target * 10 + streakBonus;
                    document.getElementById('score').textContent = score;
                    document.getElementById('message').textContent = streak >= 3 ? `🔥 Streak ${streak}! Bonus!` : '🎉 Correct!';
                    document.getElementById('message').classList.add('success');
                    speak(streak >= 3 ? `Amazing! Streak ${streak}!` : 'Great job!');

                    triggerConfetti();

                    setTimeout(() => {
                        document.getElementById('message').textContent = '';
                        document.getElementById('message').classList.remove('success');
                        generateNewRound();
                    }, 2000);
                }
            };

            obj.addEventListener('click', handleClick);
            obj.addEventListener('touchend', (e) => {
                e.preventDefault();
                handleClick(e);
            });

            gameArea.appendChild(obj);
            objects.push(obj);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;
                utterance.pitch = 1.2;
                speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
