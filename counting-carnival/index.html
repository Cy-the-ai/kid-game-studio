<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Carnival 🎪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 10px;
        }

        .game-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .title-bar {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .carnival-title {
            color: #FF6B6B;
            text-shadow: 2px 2px 0 #FFD700;
            font-size: 1.8rem;
            margin: 0;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .stats-bar {
            background: white;
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .target-value {
            color: #4ECDC4;
        }

        .count-value {
            color: #FF6B6B;
        }

        .score-value {
            color: #FFD700;
            font-size: 1.8rem;
        }

        .difficulty-bar {
            background: white;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .difficulty-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .difficulty-btn {
            flex: 1;
            min-height: 50px;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .difficulty-btn.active {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .control-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-btn {
            flex: 1;
            min-height: 50px;
            padding: 10px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .control-btn:hover {
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.reset {
            background: linear-gradient(45deg, #FF6B6B, #ee5a5a);
        }

        #game-area {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            border-radius: 15px;
            border: 3px solid #FFD700;
            overflow: hidden;
            touch-action: none;
            position: relative;
            min-height: 300px;
            max-height: 400px;
        }

        .falling-object {
            position: absolute;
            font-size: 2.5rem;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            animation: fall linear;
            transition: transform 0.1s;
            z-index: 10;
            touch-action: manipulation;
            min-width: 70px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .falling-object:active {
            transform: scale(1.2);
        }

        @keyframes fall {
            from { top: -70px; }
            to { top: 100%; }
        }

        #message {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #message.success {
            color: #28a745;
        }

        /* Mobile specific */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .carnival-title {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .score-value {
                font-size: 1.5rem;
            }

            .difficulty-btn {
                font-size: 0.75rem;
                min-height: 45px;
            }

            .control-btn {
                font-size: 0.9rem;
                min-height: 45px;
            }

            #game-area {
                min-height: 250px;
                max-height: 350px;
            }

            .falling-object {
                font-size: 2rem;
                min-width: 60px;
                min-height: 60px;
            }

            #message {
                font-size: 1rem;
                padding: 12px;
            }
        }

        /* Extra small mobile */
        @media (max-width: 480px) {
            body {
                padding: 6px;
            }

            .carnival-title {
                font-size: 1.3rem;
            }

            .stat-value {
                font-size: 1.8rem;
            }

            .score-value {
                font-size: 1.3rem;
            }

            .difficulty-btn {
                font-size: 0.7rem;
                min-height: 42px;
                padding: 6px;
            }

            .control-btn {
                font-size: 0.85rem;
                min-height: 42px;
            }

            #game-area {
                min-height: 220px;
                max-height: 320px;
            }

            .falling-object {
                font-size: 1.8rem;
                min-width: 55px;
                min-height: 55px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- Title -->
        <div class="title-bar">
            <h1 class="carnival-title">
                <i class="fas fa-ticket-alt me-2"></i>Counting Carnival
            </h1>
            <p class="subtitle">Tap falling objects to count them!</p>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-bullseye"></i> Target</div>
                    <div class="stat-value target-value" id="target-number">5</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-hashtag"></i> Count</div>
                    <div class="stat-value count-value" id="current-count">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-star"></i> Score</div>
                    <div class="stat-value score-value" id="score">0</div>
                </div>
            </div>
        </div>

        <!-- Difficulty -->
        <div class="difficulty-bar">
            <div class="difficulty-btns">
                <button class="difficulty-btn active" onclick="setDifficulty(5, 1)">
                    <i class="fas fa-leaf d-block"></i>Easy
                </button>
                <button class="difficulty-btn" onclick="setDifficulty(10, 2)">
                    <i class="fas fa-star d-block"></i>Medium
                </button>
                <button class="difficulty-btn" onclick="setDifficulty(20, 3)">
                    <i class="fas fa-fire d-block"></i>Hard
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-bar">
            <button class="control-btn" onclick="startGame()">
                <i class="fas fa-play me-1"></i>Start
            </button>
            <button class="control-btn reset" onclick="resetGame()">
                <i class="fas fa-redo me-1"></i>Reset
            </button>
        </div>

        <!-- Game Area -->
        <div id="game-area"></div>

        <!-- Message -->
        <div id="message"></div>
    </div>

    <script>
        let count = 0;
        let target = 5;
        let score = 0;
        let gameActive = false;
        let objects = [];
        let maxNumber = 5;
        let fallSpeed = 1;

        const emojis = ['🍎', '⭐', '🎈', '🎀', '🍪', '🌸', '🦋', '🌈', '🍭', '🎁'];

        function setDifficulty(max, speed) {
            maxNumber = max;
            fallSpeed = speed;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.difficulty-btn').classList.add('active');
        }

        function startGame() {
            if (gameActive) return;
            gameActive = true;
            generateNewRound();
        }

        function resetGame() {
            gameActive = false;
            count = 0;
            score = 0;
            objects = [];
            document.getElementById('game-area').innerHTML = '';
            document.getElementById('current-count').textContent = '0';
            document.getElementById('score').textContent = '0';
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('success');
        }

        function generateNewRound() {
            if (!gameActive) return;

            count = 0;
            target = Math.floor(Math.random() * maxNumber) + 1;
            document.getElementById('target-number').textContent = target;
            document.getElementById('current-count').textContent = '0';
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('success');

            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = '';

            for (let i = 0; i < target; i++) {
                createFallingObject(gameArea);
            }

            speak(`Count to ${target}!`);
        }

        function createFallingObject(gameArea) {
            const obj = document.createElement('div');
            obj.className = 'falling-object';
            obj.textContent = emojis[Math.floor(Math.random() * emojis.length)];

            // Random horizontal position
            const maxX = gameArea.offsetWidth - 70;
            obj.style.left = Math.max(0, Math.random() * maxX) + 'px';

            // Random fall speed
            obj.style.animationDuration = (4 + Math.random() * 3) / fallSpeed + 's';

            // Handle both click and touch events
            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!gameActive) return;
                if (!objects.includes(obj)) return;

                count++;
                document.getElementById('current-count').textContent = count;
                speak(count.toString());

                obj.remove();
                objects = objects.filter(o => o !== obj);

                if (count === target) {
                    score += target * 10;
                    document.getElementById('score').textContent = score;
                    document.getElementById('message').textContent = '🎉 Correct! Great job!';
                    document.getElementById('message').classList.add('success');
                    speak('Great job!');

                    setTimeout(() => {
                        document.getElementById('message').textContent = '';
                        document.getElementById('message').classList.remove('success');
                        generateNewRound();
                    }, 2000);
                }
            };

            obj.addEventListener('click', handleClick);
            obj.addEventListener('touchend', (e) => {
                e.preventDefault();
                handleClick(e);
            });

            gameArea.appendChild(obj);
            objects.push(obj);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;
                utterance.pitch = 1.2;
                speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
